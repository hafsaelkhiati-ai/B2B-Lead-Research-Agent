# ============================================================
#  nginx/leadagent.conf
#  Nginx reverse proxy config for B2B Lead Agent
#  Place this file at: /etc/nginx/sites-available/leadagent
#  Then: sudo ln -s /etc/nginx/sites-available/leadagent /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    # ⚠️  Replace with your actual domain or VPS IP
    server_name yourdomain.com www.yourdomain.com;

    # ── Frontend (React build) ──────────────────────────────
    location / {
        root /var/www/leadagent/frontend;   # ← Path where you run: npm run build
        index index.html;
        try_files $uri $uri/ /index.html;   # Required for React Router
    }

    # ── Backend API (Node.js on port 4000) ──────────────────
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health check ────────────────────────────────────────
    location /health {
        proxy_pass http://localhost:4000/health;
    }
}

